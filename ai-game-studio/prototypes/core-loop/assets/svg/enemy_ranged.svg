<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" width="40" height="48">
  <!-- Shadow -->
  <ellipse cx="20" cy="45" rx="10" ry="3" fill="rgba(0,0,0,0.2)"/>

  <!-- Robe body (trapezoid) -->
  <polygon points="12,14 28,14 34,44 6,44" fill="#2a1848"/>
  <!-- Inner robe -->
  <polygon points="14,18 26,18 30,40 10,40" fill="#3a2060"/>
  <!-- Robe trim -->
  <line x1="6" y1="44" x2="34" y2="44" stroke="#5a38a0" stroke-width="1.5"/>

  <!-- Central eye (large) -->
  <circle cx="20" cy="24" r="8" fill="white" stroke="#1a1028" stroke-width="1"/>
  <circle cx="20" cy="24" r="4.5" fill="#6040b0"/>
  <circle cx="20" cy="24" r="2" fill="#0a0018"/>
  <!-- Eye highlight -->
  <circle cx="18" cy="22" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Eye glow ring -->
  <circle cx="20" cy="24" r="10" fill="none" stroke="rgba(120,80,200,0.2)" stroke-width="2"/>

  <!-- Antennae -->
  <line x1="16" y1="12" x2="10" y2="2" stroke="#5a38a0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="12" x2="30" y2="2" stroke="#5a38a0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="10" cy="2" r="3" fill="#8060d0"/>
  <circle cx="30" cy="2" r="3" fill="#8060d0"/>
  <!-- Tip glow -->
  <circle cx="10" cy="2" r="5" fill="rgba(140,100,220,0.2)"/>
  <circle cx="30" cy="2" r="5" fill="rgba(140,100,220,0.2)"/>

  <!-- Floating particles -->
  <circle cx="8" cy="30" r="1.5" fill="rgba(140,100,220,0.4)"/>
  <circle cx="32" cy="35" r="1" fill="rgba(140,100,220,0.3)"/>
</svg>
