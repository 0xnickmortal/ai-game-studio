<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="48" height="64">
  <!-- Shadow -->
  <ellipse cx="24" cy="60" rx="14" ry="4" fill="rgba(0,0,0,0.2)"/>

  <!-- Legs -->
  <line x1="18" y1="48" x2="15" y2="58" stroke="#3a2f3f" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="48" x2="33" y2="58" stroke="#3a2f3f" stroke-width="3" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="14" cy="59" rx="4" ry="2.5" fill="#2a2018"/>
  <ellipse cx="34" cy="59" rx="4" ry="2.5" fill="#2a2018"/>

  <!-- Body (coat) -->
  <rect x="12" y="28" width="24" height="24" rx="4" fill="#f0efe8"/>
  <rect x="12" y="28" width="24" height="24" rx="4" fill="none" stroke="#4a4555" stroke-width="1"/>

  <!-- Apron -->
  <polygon points="15,36 33,36 35,52 13,52" fill="#f5f2ec"/>
  <line x1="15" y1="36" x2="11" y2="40" stroke="#e8e4dc" stroke-width="1"/>
  <line x1="33" y1="36" x2="37" y2="40" stroke="#e8e4dc" stroke-width="1"/>
  <!-- Apron pocket -->
  <rect x="20" y="42" width="8" height="6" rx="1" fill="#e8e4dc" stroke="#ddd8d0" stroke-width="0.5"/>
  <!-- Pocket utensil -->
  <line x1="23" y1="42" x2="23" y2="39" stroke="#888" stroke-width="1" stroke-linecap="round"/>

  <!-- Arms -->
  <line x1="12" y1="34" x2="6" y2="44" stroke="#f0efe8" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="34" x2="42" y2="44" stroke="#f0efe8" stroke-width="4" stroke-linecap="round"/>
  <!-- Hands (skin) -->
  <circle cx="5" cy="45" r="3" fill="#e8c8a8"/>
  <circle cx="43" cy="45" r="3" fill="#e8c8a8"/>

  <!-- Head (skin) -->
  <ellipse cx="24" cy="24" rx="10" ry="9" fill="#ecc8a0"/>
  <ellipse cx="24" cy="24" rx="10" ry="9" fill="none" stroke="#b89878" stroke-width="0.5"/>

  <!-- Cheeks -->
  <circle cx="16" cy="26" r="3" fill="rgba(240,140,130,0.25)"/>
  <circle cx="32" cy="26" r="3" fill="rgba(240,140,130,0.25)"/>

  <!-- Eyes -->
  <ellipse cx="20" cy="23" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="28" cy="23" rx="3" ry="3.5" fill="white"/>
  <circle cx="20.5" cy="23.5" r="1.8" fill="#1a1520"/>
  <circle cx="28.5" cy="23.5" r="1.8" fill="#1a1520"/>
  <!-- Eye highlights -->
  <circle cx="19.5" cy="22" r="0.8" fill="white"/>
  <circle cx="27.5" cy="22" r="0.8" fill="white"/>

  <!-- Mouth -->
  <path d="M21,28 Q24,30 27,28" fill="none" stroke="#8a5540" stroke-width="1" stroke-linecap="round"/>

  <!-- Chef hat -->
  <ellipse cx="24" cy="16" rx="14" ry="4" fill="white" stroke="#e0ddd5" stroke-width="0.5"/>
  <!-- Hat body -->
  <path d="M12,16 Q11,4 16,2 Q20,-1 24,0 Q28,-1 32,2 Q37,4 36,16" fill="white" stroke="#e8e5dd" stroke-width="0.5"/>
  <!-- Hat puffs -->
  <circle cx="18" cy="5" r="5" fill="#fafaf8"/>
  <circle cx="24" cy="3" r="5.5" fill="#fcfcfa"/>
  <circle cx="30" cy="5" r="5" fill="#fafaf8"/>
  <!-- Hat band -->
  <rect x="11" y="14" width="26" height="3" rx="1" fill="#cc2222"/>
</svg>
