<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Shadow -->
  <ellipse cx="20" cy="37" rx="12" ry="3" fill="rgba(0,0,0,0.25)"/>

  <!-- Body blob -->
  <ellipse cx="20" cy="22" rx="14" ry="16" fill="#6b2848"/>
  <!-- Body highlight -->
  <ellipse cx="17" cy="16" rx="6" ry="5" fill="rgba(255,255,255,0.12)"/>
  <!-- Body bottom (darker) -->
  <ellipse cx="20" cy="30" rx="12" ry="8" fill="rgba(0,0,0,0.15)"/>

  <!-- Eyes (white) -->
  <ellipse cx="15" cy="18" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="25" cy="18" rx="4" ry="4.5" fill="white"/>
  <!-- Pupils -->
  <circle cx="16" cy="19" r="2.2" fill="#0a0010"/>
  <circle cx="26" cy="19" r="2.2" fill="#0a0010"/>
  <!-- Eye highlights -->
  <circle cx="14.5" cy="17" r="1" fill="white"/>
  <circle cx="24.5" cy="17" r="1" fill="white"/>

  <!-- Angry eyebrows -->
  <line x1="10" y1="12" x2="16" y2="14" stroke="#2a0a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="12" x2="24" y2="14" stroke="#2a0a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Mouth (jagged) -->
  <polyline points="14,26 16,24 18,26 20,24 22,26 24,24 26,26" fill="none" stroke="#1a0010" stroke-width="1.5" stroke-linecap="round"/>
</svg>
